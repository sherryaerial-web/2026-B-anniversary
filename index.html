<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="deploy-refresh" content="2026-07-05T17:42:00+08:00">
  <title>Sherry Aerial 2026 Anniversary</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #24475f;
      --muted: #6e8190;
      --paper: #f8fcff;
      --sea: #8fcbe0;
      --sky: #e8f7ff;
      --mist: #d8edf6;
      --line: rgba(36, 71, 95, 0.14);
      --glass: rgba(255, 255, 255, 0.86);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans TC", sans-serif;
      background:
        linear-gradient(115deg, rgba(255, 255, 255, 0.88), rgba(248, 252, 255, 0.5)),
        radial-gradient(circle at 12% 16%, rgba(143, 203, 224, 0.74), transparent 19rem),
        radial-gradient(circle at 88% 18%, rgba(216, 237, 246, 0.86), transparent 17rem),
        radial-gradient(circle at 70% 92%, rgba(232, 247, 255, 0.96), transparent 24rem),
        radial-gradient(circle at 8% 86%, rgba(187, 220, 235, 0.3), transparent 15rem),
        linear-gradient(135deg, #fbfdff 0%, #f1f9fd 54%, #f9fcff 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 42rem;
      height: 42rem;
      right: -18rem;
      bottom: -22rem;
      border: 1px solid rgba(76, 137, 164, 0.22);
      border-radius: 50%;
    }

    body::after {
      left: 1.1rem;
      top: 1.1rem;
      width: calc(100% - 2.2rem);
      height: calc(100% - 2.2rem);
      border: 1px solid rgba(76, 137, 164, 0.18);
      border-radius: 1.4rem;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.6rem;
    }

    .lottery-panel {
      width: min(100%, 430px);
      padding: 2.05rem 1.45rem 1.45rem;
      border: 1px solid rgba(255, 255, 255, 0.88);
      border-radius: 1.1rem;
      background: var(--glass);
      box-shadow: 0 24px 64px rgba(36, 71, 95, 0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      text-align: center;
    }

    .brand-mark {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
      color: #4f86a0;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      height: 1px;
      background: rgba(79, 134, 160, 0.32);
    }

    h1 {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.05rem, 10.8vw, 3.45rem);
      line-height: 1.02;
      color: var(--ink);
      letter-spacing: 0;
      font-weight: 600;
    }

    h1 span {
      display: block;
    }

    .year {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 6.5rem;
      min-height: 2.35rem;
      margin-bottom: 0.45rem;
      border-top: 1px solid rgba(79, 134, 160, 0.36);
      border-bottom: 1px solid rgba(79, 134, 160, 0.36);
      color: #5f8faa;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.24em;
    }

    .headline {
      margin: 0.7rem 0 1.55rem;
      color: var(--muted);
      font-size: 0.88rem;
      letter-spacing: 0.16em;
    }

    .input-box {
      width: 100%;
      min-height: 3.35rem;
      margin-bottom: 0.85rem;
      padding: 0 1rem;
      border: 1px solid var(--line);
      border-radius: 0.72rem;
      background: rgba(255, 255, 255, 0.86);
      color: var(--ink);
      font-size: 0.96rem;
      outline: none;
      text-align: center;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input-box:focus {
      border-color: rgba(79, 134, 160, 0.44);
      box-shadow: 0 0 0 4px rgba(143, 203, 224, 0.3);
    }

    .btn {
      width: 100%;
      min-height: 3.6rem;
      margin-top: 0.2rem;
      border: 0;
      border-radius: 0.72rem;
      background: linear-gradient(135deg, #2f6f93, #79bfd7);
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.24em;
      box-shadow: 0 16px 28px rgba(47, 111, 147, 0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 20px 36px rgba(47, 111, 147, 0.26);
    }

    .btn:disabled {
      cursor: wait;
      opacity: 0.75;
      transform: none;
    }

    #slot {
      display: grid;
      place-items: center;
      min-height: 8rem;
      margin: 1.7rem 0 0.8rem;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(5.2rem, 25vw, 7.6rem);
      line-height: 1;
      color: var(--ink);
    }

    .swal2-popup {
      border-radius: 1rem !important;
      color: var(--ink) !important;
      font-family: "Noto Sans TC", sans-serif !important;
    }

    .swal2-title {
      color: var(--ink) !important;
      font-family: "Cormorant Garamond", "Noto Sans TC", serif !important;
      letter-spacing: 0 !important;
    }

    .prize-list {
      display: grid;
      gap: 0.75rem;
      max-height: 420px;
      overflow-y: auto;
      padding: 0.1rem 0.15rem 0.15rem;
      text-align: left;
    }

    .prize-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.75rem;
      align-items: center;
      width: 100%;
      min-height: 4.3rem;
      padding: 0.9rem;
      border: 1px solid rgba(67, 59, 50, 0.1);
      border-radius: 0.72rem;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      text-align: left;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .prize-card:hover {
      transform: translateY(-1px);
      border-color: rgba(184, 138, 66, 0.5);
      box-shadow: 0 12px 28px rgba(93, 73, 43, 0.1);
    }

    .prize-name {
      font-weight: 700;
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .prize-meta {
      margin-top: 0.2rem;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.5;
    }

    .claim-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.45rem;
    }

    .claim-tag {
      display: inline-flex;
      align-items: center;
      min-height: 1.55rem;
      padding: 0 0.55rem;
      border-radius: 999px;
      background: rgba(143, 203, 224, 0.16);
      color: #4f86a0;
      font-size: 0.72rem;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    .pick-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 3.1rem;
      min-height: 2rem;
      border-radius: 999px;
      background: rgba(207, 232, 223, 0.58);
      color: var(--ink);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .notice-box {
      margin: 0.85rem 0;
      padding: 0.85rem 0.95rem;
      border: 1px solid rgba(143, 203, 224, 0.28);
      border-radius: 0.72rem;
      background: rgba(232, 247, 255, 0.6);
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.65;
      text-align: left;
    }

    .notice-title {
      display: block;
      margin-bottom: 0.2rem;
      color: var(--ink);
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.12em;
    }

    .detail-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
      gap: 0.75rem;
      margin: 0.45rem 0 0.85rem;
    }

    .detail-images img {
      width: 100%;
      height: 180px;
      object-fit: contain;
      border: 1px solid rgba(67, 59, 50, 0.1);
      border-radius: 0.68rem;
      background: #fffdf8;
      cursor: zoom-in;
    }

    .detail-media-section {
      margin: 0.8rem 0 0;
      text-align: left;
    }

    .detail-media-title {
      display: block;
      margin: 0 0 0.35rem;
      color: var(--ink);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
    }

    .detail-images.size-chart {
      grid-template-columns: 1fr;
    }

    .detail-images.size-chart img {
      height: auto;
      max-height: 360px;
    }

    .image-preview {
      width: min(100%, 820px);
      max-height: 76vh;
      object-fit: contain;
      border-radius: 0.72rem;
      background: #fff;
    }

    .image-lightbox {
      position: fixed;
      inset: 0;
      z-index: 12000;
      display: grid;
      place-items: center;
      padding: 1rem;
      background: rgba(17, 35, 48, 0.72);
      cursor: zoom-out;
    }

    .image-lightbox img {
      max-width: min(100%, 920px);
      max-height: 86vh;
      object-fit: contain;
      border-radius: 0.72rem;
      background: #fff;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
    }

    .image-lightbox button {
      position: fixed;
      top: 1rem;
      right: 1rem;
      width: 2.6rem;
      height: 2.6rem;
      border: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      cursor: pointer;
      font-size: 1.5rem;
      line-height: 1;
    }

    .venue-select {
      width: 100%;
      min-height: 3rem;
      margin-top: 0.75rem;
      padding: 0 0.85rem;
      border: 1px solid var(--line);
      border-radius: 0.72rem;
      background: #fff;
      color: var(--ink);
      font-size: 0.95rem;
    }

    .coupon-box {
      margin: 1rem 0 0.3rem;
      padding: 1rem;
      border: 1px dashed rgba(184, 138, 66, 0.82);
      border-radius: 0.72rem;
      background: #fffaf0;
      color: var(--ink);
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="lottery-panel" aria-label="Sherry Aerial Studio 週年慶抽獎">
      <div class="brand-mark">Summer Lucky Draw</div>
      <div class="year">2026</div>
      <h1><span>Sherry Aerial</span><span>Studio B</span></h1>
      <p class="headline">B 館周年慶抽獎</p>

      <div id="view-login">
        <select id="email-select" class="input-box">
          <option value="">讀取名單中...</option>
        </select>
        <input type="text" id="code" class="input-box" placeholder="輸入指定密碼" autocomplete="one-time-code">
        <button class="btn" id="main-btn" type="button" onclick="onStartDraw()">抽獎</button>
      </div>

      <div id="view-anim" style="display:none;">
        <div id="slot">?</div>
        <p class="headline" id="anim-text">抽獎中...</p>
      </div>
    </section>
  </main>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbyYAr6WrruTVtPMVpw0kex17DdwzU7G-rynefv_RFJ_k_PtaLcaapKiyResQirN8L1E/exec";
    let userEmail = "";
    let userCode = "";
    let cachedPrizes = [];

    window.onload = async () => {
      try {
        const resp = await fetch(scriptURL, {
          method: "POST",
          body: JSON.stringify({ action: "getEmailList" })
        });
        const res = await resp.json();
        const select = document.getElementById("email-select");
        select.innerHTML = '<option value="">請選擇您的 OB 帳號 / Email</option>';
        (res.emails || []).forEach((email) => {
          const option = document.createElement("option");
          option.value = email;
          option.textContent = email;
          select.appendChild(option);
        });
      } catch (err) {
        document.getElementById("email-select").innerHTML = '<option value="">連線錯誤，請刷新頁面</option>';
      }
    };

    async function onStartDraw() {
      userEmail = document.getElementById("email-select").value;
      userCode = document.getElementById("code").value.trim();
      const mainBtn = document.getElementById("main-btn");

      if (!userEmail || !userCode) {
        showMessage("請完整填寫帳號與密碼");
        return;
      }

      mainBtn.disabled = true;
      mainBtn.innerText = "確認中";

      try {
        const resp = await fetch(scriptURL, {
          method: "POST",
          body: JSON.stringify({ action: "verifyAndDraw", email: userEmail, code: userCode })
        });
        const res = await resp.json();
        if (!res.success) {
          showMessage(res.msg || "驗證失敗");
          mainBtn.disabled = false;
          mainBtn.innerText = "抽獎";
          return;
        }

        cachedPrizes = normalizePrizes(res.prizes || []);
        document.getElementById("view-login").style.display = "none";
        document.getElementById("view-anim").style.display = "block";
        runSlotAnimation(res.rank, cachedPrizes);
      } catch (err) {
        showMessage("連線超時，請稍後再試");
        mainBtn.disabled = false;
        mainBtn.innerText = "抽獎";
      }
    }

    function runSlotAnimation(rank, prizes) {
      let count = 0;
      const slot = document.getElementById("slot");
      const ranks = ["S", "A", "B", "C", "D", "E", "F"];
      const itv = setInterval(() => {
        slot.innerText = ranks[Math.floor(Math.random() * ranks.length)];
        if (++count > 35) {
          clearInterval(itv);
          slot.innerText = rank;
          confetti({
            particleCount: 120,
            spread: 76,
            origin: { y: 0.62 },
            colors: ["#2f6f93", "#79bfd7", "#8fcbe0", "#e8f7ff", "#ffffff"]
          });
          showPrizes(rank, prizes);
        }
      }, 80);
    }

    function normalizePrizes(prizes) {
      return prizes.map((item, index) => {
        if (typeof item === "string") {
          return { id: item, name: item, note: "", venues: [], requiresVenue: false, photos: [], sizeCharts: [], images: [] };
        }
        const photos = [
          ...splitImageUrls(item.mainImageUrl),
          ...splitImageUrls(item.styleImageUrl)
        ];
        const sizeCharts = splitImageUrls(item.sizeChartImageUrl);
        return {
          id: item.id || item.prizeId || item.name || String(index),
          name: item.name || item.prizeName || "",
          note: item.note || item.displayNote || "",
          claimMethod: item.claimMethod || "",
          requiresVenue: Boolean(item.requiresVenue),
          venues: Array.isArray(item.venues) ? item.venues : [],
          photos,
          sizeCharts,
          images: [...photos, ...sizeCharts]
        };
      });
    }

    function splitImageUrls(value) {
      if (!value) return [];
      if (Array.isArray(value)) return value.flatMap(splitImageUrls);
      return String(value)
        .split(/[\n\r\t ;；]+/)
        .map((url) => url.trim())
        .filter(Boolean);
    }

    function showPrizes(rank, prizes) {
      const wrap = document.createElement("div");
      const notice = document.createElement("p");
      notice.className = "prize-meta";
      notice.textContent = "請選擇一個獎項，送出後即無法更換";
      wrap.appendChild(notice);

      const list = document.createElement("div");
      list.className = "prize-list";
      prizes.forEach((prize) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "prize-card";
        button.innerHTML = `
          <span>
            <span class="prize-name"></span>
            <span class="claim-tags"></span>
          </span>
          <span class="pick-pill">選取</span>
        `;
        button.querySelector(".prize-name").textContent = prize.name;
        claimTags(prize).forEach((label) => {
          const tag = document.createElement("span");
          tag.className = "claim-tag";
          tag.textContent = label;
          button.querySelector(".claim-tags").appendChild(tag);
        });
        button.addEventListener("click", () => confirmPick(rank, prize));
        list.appendChild(button);
      });
      wrap.appendChild(list);

      Swal.fire({
        title: `RANK ${rank}`,
        html: wrap,
        showConfirmButton: false,
        allowOutsideClick: false,
        allowEscapeKey: false,
        background: "#fff",
        footer: '<span style="color:#888;font-size:11px;">關閉頁面可能導致無法完成領獎，請務必完成選取</span>'
      });
    }

    function claimLabel(prize) {
      if (prize.requiresVenue) return "需選擇領取館別";
      if (prize.claimMethod === "show_code") return "完成後顯示折扣碼";
      if (prize.images.length) return "可查看樣式 / 尺寸表";
      return "送出後將寫入中獎紀錄";
    }

    function claimTags(prize) {
      const tags = [];
      if (prize.requiresVenue) tags.push("需選館別");
      if (prize.claimMethod === "show_code") tags.push("折扣碼");
      if (!tags.length) {
        const needsContact = String(prize.note || "").includes("私訊官方帳號");
        tags.push(needsContact ? "私訊官方帳號領取" : "直接領取");
      }
      if (prize.images.length) tags.push("含圖片");
      return tags;
    }

    function confirmPick(rank, prize) {
      const content = document.createElement("div");
      const name = document.createElement("p");
      name.textContent = prize.name;
      name.style.fontWeight = "700";
      content.appendChild(name);

      if (prize.note) {
        const note = document.createElement("div");
        note.className = "notice-box";
        note.innerHTML = '<span class="notice-title">領取方式</span>';
        note.appendChild(document.createTextNode(prize.note));
        content.appendChild(note);
      }

      if (prize.images.length) {
        if (prize.photos.length) {
          content.appendChild(createImageSection("示意圖", prize.photos, `${prize.name} 示意圖`, ""));
        }
        if (prize.sizeCharts.length) {
          content.appendChild(createImageSection("尺寸表", prize.sizeCharts, `${prize.name} 尺寸表`, "size-chart"));
        }
      }

      if (prize.requiresVenue) {
        const select = document.createElement("select");
        select.id = "venue-select";
        select.className = "venue-select";
        select.innerHTML = '<option value="">請選擇領取館別</option>';
        prize.venues.forEach((venue) => {
          const option = document.createElement("option");
          option.value = venue;
          option.textContent = venue;
          select.appendChild(option);
        });
        content.appendChild(select);
      }

      Swal.fire({
        title: "確認選擇",
        html: content,
        icon: "question",
        showCancelButton: true,
        confirmButtonColor: "#2f6f93",
        cancelButtonColor: "#999",
        confirmButtonText: "確定",
        cancelButtonText: "返回",
        background: "#fff",
        preConfirm: () => {
          const venueSelect = document.getElementById("venue-select");
          if (venueSelect && !venueSelect.value) {
            Swal.showValidationMessage("請選擇領取館別");
            return false;
          }
          return { selectedVenue: venueSelect ? venueSelect.value : "" };
        }
      }).then((result) => {
        if (result.isConfirmed) {
          onPick(rank, prize, result.value.selectedVenue);
        } else if (result.dismiss === Swal.DismissReason.cancel) {
          showPrizes(rank, cachedPrizes);
        }
      });
    }

    function createImageSection(title, urls, alt, extraClass) {
      const section = document.createElement("div");
      section.className = "detail-media-section";

      const label = document.createElement("span");
      label.className = "detail-media-title";
      label.textContent = title;
      section.appendChild(label);

      const images = document.createElement("div");
      images.className = `detail-images ${extraClass || ""}`.trim();
      urls.forEach((src) => {
        const img = document.createElement("img");
        img.src = src;
        img.alt = alt;
        img.addEventListener("click", () => previewImage(src, alt));
        images.appendChild(img);
      });
      section.appendChild(images);
      return section;
    }

    function previewImage(src, alt) {
      const overlay = document.createElement("div");
      overlay.className = "image-lightbox";

      const img = document.createElement("img");
      img.src = src;
      img.alt = alt;

      const close = document.createElement("button");
      close.type = "button";
      close.setAttribute("aria-label", "關閉圖片預覽");
      close.textContent = "×";

      const remove = () => overlay.remove();
      overlay.addEventListener("click", remove);
      close.addEventListener("click", remove);
      img.addEventListener("click", (event) => event.stopPropagation());

      overlay.appendChild(img);
      overlay.appendChild(close);
      document.body.appendChild(overlay);
    }

    async function onPick(rank, prize, selectedVenue) {
      Swal.fire({
        title: "紀錄中...",
        background: "#fff",
        didOpen: () => Swal.showLoading()
      });

      try {
        const resp = await fetch(scriptURL, {
          method: "POST",
          body: JSON.stringify({
            action: "confirmSelection",
            email: userEmail,
            code: userCode,
            rank,
            prizeId: prize.id,
            prizeName: prize.name,
            selectedVenue
          })
        });
        const res = await resp.json();
        if (!res.success) {
          showMessage(res.msg || "紀錄失敗");
          return;
        }

        celebrate();
        showResult(prize.name, selectedVenue, res.couponCode);
      } catch (err) {
        showMessage("紀錄失敗，請截圖並聯繫工作人員");
      }
    }

    function showResult(prizeName, selectedVenue, couponCode) {
      const result = document.createElement("div");
      const prize = document.createElement("p");
      prize.textContent = `獎項：${prizeName}`;
      result.appendChild(prize);

      if (selectedVenue) {
        const venue = document.createElement("p");
        venue.textContent = `領取館別：${selectedVenue}`;
        result.appendChild(venue);
      }

      if (couponCode) {
        const label = document.createElement("p");
        label.className = "prize-meta";
        label.textContent = "請截圖保存折扣碼";
        const code = document.createElement("div");
        code.className = "coupon-box";
        code.textContent = couponCode;
        result.appendChild(label);
        result.appendChild(code);
      }

      Swal.fire({
        icon: "success",
        iconColor: "#79bfd7",
        title: "恭喜中獎",
        html: result,
        background: "#fff",
        confirmButtonColor: "#2f6f93",
        confirmButtonText: "完成",
        allowOutsideClick: false,
        allowEscapeKey: false
      }).then(() => location.reload());
    }

    function celebrate() {
      const end = Date.now() + 1800;
      const colors = ["#2f6f93", "#79bfd7", "#8fcbe0", "#e8f7ff", "#ffffff"];
      (function frame() {
        confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors });
        confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors });
        if (Date.now() < end) requestAnimationFrame(frame);
      }());
    }

    function showMessage(text) {
      Swal.fire({
        text,
        background: "#fff",
        color: "#24475f",
        confirmButtonColor: "#2f6f93"
      });
    }
  </script>
</body>
</html>
